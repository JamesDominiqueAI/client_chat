name: CI

on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read

concurrency:
  group: client-chat-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Test And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend workspace dependencies
        run: UV_CACHE_DIR=/tmp/uv-cache uv sync --all-packages

      - name: Run backend tests
        run: UV_CACHE_DIR=/tmp/uv-cache uv run --package customer-report-agent-api python -m pytest backend/tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8010
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Build static frontend export
        working-directory: frontend
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8010
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build:static

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform
