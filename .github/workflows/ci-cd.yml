name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Choose the target environment for manual deployment."
        required: true
        default: production
        type: choice
        options:
          - development
          - production
      git_ref:
        description: "Branch, tag, or commit SHA to deploy."
        required: false
        default: main

permissions:
  contents: read
  id-token: write

concurrency:
  group: client-chat-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Test And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend workspace dependencies
        run: UV_CACHE_DIR=/tmp/uv-cache uv sync --all-packages

      - name: Run backend tests
        run: UV_CACHE_DIR=/tmp/uv-cache uv run --package customer-report-agent-api python -m pytest backend/tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8010
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Build static frontend export
        working-directory: frontend
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8010
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build:static

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform

  deploy_dev:
    name: Deploy To AWS Development
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          role-session-name: client-chat-dev-github-actions
          aws-region: ${{ secrets.DEFAULT_AWS_REGION || 'us-east-1' }}

      - name: Deploy development
        env:
          DEFAULT_AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION || 'us-east-1' }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME_DEV || 'client-chat-dev' }}
          COMPLAINTS_TABLE_NAME: ${{ secrets.COMPLAINTS_TABLE_NAME_DEV || 'client-chat-dev-complaints' }}
          AUDIT_TABLE_NAME: ${{ secrets.AUDIT_TABLE_NAME_DEV || 'client-chat-dev-audit' }}
          MANAGER_PASSWORD: ${{ secrets.MANAGER_PASSWORD_DEV }}
          MANAGER_AUTH_SECRET: ${{ secrets.MANAGER_AUTH_SECRET_DEV }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_DEV }}
          ALARM_EMAIL: ${{ secrets.ALARM_EMAIL_DEV }}
        run: bash scripts/deploy_aws.sh

      - name: Smoke test API
        env:
          API_BASE_URL: ${{ secrets.DEV_API_BASE_URL }}
        run: curl --fail --silent --show-error "${API_BASE_URL}/health"

  deploy_manual:
    name: Deploy Selected AWS Environment
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ github.event.inputs.environment == 'development' && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN }}
          role-session-name: ${{ github.event.inputs.environment == 'development' && 'client-chat-dev-github-actions' || 'client-chat-prod-github-actions' }}
          aws-region: ${{ secrets.DEFAULT_AWS_REGION || 'us-east-1' }}

      - name: Deploy selected environment
        env:
          DEFAULT_AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION || 'us-east-1' }}
          PROJECT_NAME: ${{ github.event.inputs.environment == 'development' && (secrets.PROJECT_NAME_DEV || 'client-chat-dev') || (secrets.PROJECT_NAME || 'client-chat') }}
          COMPLAINTS_TABLE_NAME: ${{ github.event.inputs.environment == 'development' && (secrets.COMPLAINTS_TABLE_NAME_DEV || 'client-chat-dev-complaints') || (secrets.COMPLAINTS_TABLE_NAME || 'client-chat-complaints') }}
          AUDIT_TABLE_NAME: ${{ github.event.inputs.environment == 'development' && (secrets.AUDIT_TABLE_NAME_DEV || 'client-chat-dev-audit') || (secrets.AUDIT_TABLE_NAME || 'client-chat-audit') }}
          MANAGER_PASSWORD: ${{ github.event.inputs.environment == 'development' && secrets.MANAGER_PASSWORD_DEV || secrets.MANAGER_PASSWORD }}
          MANAGER_AUTH_SECRET: ${{ github.event.inputs.environment == 'development' && secrets.MANAGER_AUTH_SECRET_DEV || secrets.MANAGER_AUTH_SECRET }}
          SLACK_WEBHOOK_URL: ${{ github.event.inputs.environment == 'development' && secrets.SLACK_WEBHOOK_URL_DEV || secrets.SLACK_WEBHOOK_URL }}
          ALARM_EMAIL: ${{ github.event.inputs.environment == 'development' && secrets.ALARM_EMAIL_DEV || secrets.ALARM_EMAIL }}
        run: bash scripts/deploy_aws.sh

      - name: Smoke test API
        env:
          API_BASE_URL: ${{ github.event.inputs.environment == 'development' && secrets.DEV_API_BASE_URL || secrets.PROD_API_BASE_URL }}
        run: curl --fail --silent --show-error "${API_BASE_URL}/health"
